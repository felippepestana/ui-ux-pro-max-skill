name: aiox-squads-ui · CI

on:
  pull_request:
    paths:
      - "apps/aiox-squads-ui/**"
      - ".github/workflows/aiox-squads-ui-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/aiox-squads-ui/**"
      - ".github/workflows/aiox-squads-ui-ci.yml"

concurrency:
  group: aiox-ui-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/aiox-squads-ui

jobs:
  validate:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/aiox-squads-ui/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (Next.js)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
