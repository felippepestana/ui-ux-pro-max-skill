version: '3.8'

services:
  # Flask Backend + React Frontend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ui-ux-pro-max-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - WORKERS=${WORKERS:-4}
      - WORKER_CLASS=${WORKER_CLASS:-sync}
      - PORT=5000
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "app=ui-ux-pro-max"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ui-ux-pro-max-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge

volumes:
  data:
    driver: local
  logs:
    driver: local
