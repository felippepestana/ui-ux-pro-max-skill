# Upstream do Flask backend
upstream flask_app {
    server app:5000;
    keepalive 32;
}

# HTTP - Redireciona para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Permitir Certbot validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirecionar tudo mais para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Servidor principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL certificates (substitua com seus caminhos reais)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logging
    access_log /var/log/nginx/app_access.log main;
    error_log /var/log/nginx/app_error.log warn;

    # Root para arquivos estáticos
    root /app/web/dist;

    # Static files - Cache agressivo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri @fallback;
    }

    # HTML files - Sem cache
    location ~* \.html?$ {
        expires 0;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    }

    # SPA fallback
    location @fallback {
        rewrite ^.*$ /index.html last;
    }

    # API routes - Proxy para Flask
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://flask_app;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://flask_app/api/health;
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        try_files $uri =204;
        access_log off;
    }

    # Root
    location / {
        try_files $uri /index.html;
    }
}
